services:
  dhan-risk-manager:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LOG_FILE=/app/logs/dhan_risk_manager.log
      - TZ=Asia/Kolkata
    volumes:
      - logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "test", "-f", "/app/logs/dhan_risk_manager.log"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  logs:
